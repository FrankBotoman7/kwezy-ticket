<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>KWEZY BUSES | Ticket Verification</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <h2>Result</h2>

    <div class="icon">
        T
    </div>

    <div class="label">
        Text
    </div>

    <div class="result">
        TicketNo:KWE6526073 Customer:FRANK BOTOMAN Phone:0993035325
    </div>

    <button onclick="searchAgain()">
        Search
    </button>

    <button onclick="copyText()">
        Copy text
    </button>

</div>

<script>
    function searchAgain() {
        location.reload();
    }

    function copyText() {
        const result = document.querySelector(".result").innerText;

        navigator.clipboard.writeText(result);

        alert("Copied!");
    }
</script>

</body>
</html>
