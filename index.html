<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    >

    <title>Result</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="result-page">

    <button
        class="back-button"
        type="button"
        aria-label="Go back"
        onclick="goBack()"
    >
        <svg
            viewBox="0 0 24 24"
            aria-hidden="true"
        >
            <path
                d="M15 18L9 12L15 6"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
            />
        </svg>
    </button>

    <h1>Result</h1>

    <section class="result-content">

        <div class="text-icon" aria-hidden="true">
            T
        </div>

        <div class="text-information">

            <div class="label">Text</div>

            <p class="result-text" id="resultText">
                TicketNo:KWE6526073 Customer:FRANK BOTOMAN Phone:0993035325
            </p>

        </div>

    </section>

    <div class="button-area">

        <button
            class="action-button"
            type="button"
            onclick="searchAgain()"
        >
            Search
        </button>

        <button
            class="action-button"
            type="button"
            onclick="copyText()"
        >
            Copy text
        </button>

    </div>

</main>

<script>
    /*
     * Customer information retained in the code.
     */
    const ticketData = {
        ticketNumber: "KWE6526073",
        customerName: "FRANK BOTOMAN",
        phoneNumber: "0993035325"
    };

    function goBack() {
        if (window.history.length > 1) {
            window.history.back();
        }
    }

    function searchAgain() {
        window.location.reload();
    }

    async function copyText() {
        const resultText =
            `TicketNo:${ticketData.ticketNumber} ` +
            `Customer:${ticketData.customerName} ` +
            `Phone:${ticketData.phoneNumber}`;

        try {
            await navigator.clipboard.writeText(resultText);
            alert("Copied!");
        } catch (error) {
            fallbackCopy(resultText);
        }
    }

    function fallbackCopy(text) {
        const temporaryInput = document.createElement("textarea");

        temporaryInput.value = text;
        temporaryInput.style.position = "fixed";
        temporaryInput.style.opacity = "0";

        document.body.appendChild(temporaryInput);

        temporaryInput.select();
        document.execCommand("copy");

        temporaryInput.remove();

        alert("Copied!");
    }
</script>

</body>
</html>
